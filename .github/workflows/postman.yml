name: Automated API tests using Postman CLI

on: push

jobs:
  automated-api-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: user_api
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d user_api"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_DATABASE: user_api
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_PORT: 5432
      DEMO_X_API_KEY: ci-api-key
      DEMO_JWT_SECRET: ci-jwt-secret
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Initialize database
        run: PGPASSWORD=postgres psql -h localhost -U postgres -d user_api -f database_schema.txt
      - name: Start API server
        run: nohup node server.js >/tmp/user-api.log 2>&1 &
      - name: Wait for API server
        run: |
          for i in {1..30}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3000 || true)
            if [ "$status" = "404" ]; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/user-api.log
          exit 1
      - name: Install Postman CLI
        run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh
      - name: Login to Postman CLI
        run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}
      - name: Run API tests
        run: |
          postman collection run "55929700-c5834f65-7a67-4869-afc5-67cb662ed719" --env-var "baseUrl=http://127.0.0.1:3000" --env-var "apiKey=${{ env.DEMO_X_API_KEY }}"
