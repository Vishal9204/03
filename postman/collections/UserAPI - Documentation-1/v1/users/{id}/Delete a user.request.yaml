$kind: http-request
url: "{{baseUrl}}/v1/users/:id"
method: DELETE
description: |-
  Permanently deletes the user identified by `id`.

  **Auth:** Requires a valid `X-API-Key` header.

  ### Path parameters

  | Param | Type | Required | Description |
  | ----- | ---- | -------- | ----------- |
  | `id` | integer | yes | The unique ID of the user to delete |

  ### Responses

  - `200 OK` — returns `{ "message": "User deleted successfully" }`.
  - `401 Unauthorized` — missing or invalid API key.
  - `500 Internal Server Error` — database or server error.
